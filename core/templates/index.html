{% extends 'base.html' %}
{% load humanize %}
{% block content %}
    <div class="row">
        <h1>Produtos</h1>
        <table class="table table-stripped">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nome</th>
                    <th scope="col">Preço</th>
                    <th scope="col">Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for produto in produtos %}
                    <tr>
                        <td>{{ produto.id }}</td>
                        <td>{{ produto.nome }}</td>
                        <td>R$ {{ produto.preco|intcomma }}</td> <!-- para formata o preco com ,-->
                        <td>
                            <a class="btn btn-warning" href="{% url 'atualizar_produto' produto.pk %}">Editar</a> <!-- ajeitamos a rota e o paramento para a rota-->
                            <a class="btn btn-danger" href="{% url 'deletar_produto' produto.pk %}">Deletar</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <a class="btn" href="{% url 'adicionar_produto' %}">Adicionar</a>

    </div>
{% endblock %}
